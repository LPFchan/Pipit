<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Material Mapper — Uguisu</title>
  <style>
    :root {
      --bg:         #0c0e16;
      --surface:    #14172a;
      --surface2:   #1c1f30;
      --border:     #252840;
      --text:       #dde2f4;
      --text-dim:   #6070a0;
      --text-code:  #8aa8d8;
      --accent:     #4d7aff;
      --green:      #2fd98e;
      --red:        #ff4d6a;
      --panel-w:    400px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
    }
    .header-title { font-size: 14px; font-weight: 600; }
    .header-sub   { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
    .header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

    .btn {
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 500;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .8; }
    .btn-ghost  { background: var(--surface2); color: var(--text); }
    .btn-accent { background: var(--accent);   color: #fff; border-color: transparent; }
    .btn-green  { background: var(--green);    color: #000; border-color: transparent; }

    /* ── Main layout ─────────────────────────────────────────── */
    .layout {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* ── Viewer pane ─────────────────────────────────────────── */
    .viewer-pane {
      flex: 1;
      position: relative;
      background: #080a12;
      overflow: hidden;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
    }
    #canvas-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* Drop overlay */
    .drop-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: background .15s;
    }
    .drop-overlay.drag-active { background: rgba(77,122,255,.07); }
    .drop-overlay.hidden { display: none; }
    .drop-icon {
      width: 56px; height: 56px;
      border-radius: 14px;
      border: 2px dashed var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      color: var(--text-dim);
    }
    .drop-title { font-size: 14px; font-weight: 500; color: var(--text-dim); }
    .drop-hint  { font-size: 11px; color: #3a4060; }

    /* ── Right panel ─────────────────────────────────────────── */
    .panel {
      width: var(--panel-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      min-height: 0;
    }

    .section-hdr {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-dim);
    }
    .part-count {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* Parts list */
    .parts-list {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }
    .parts-list::-webkit-scrollbar { width: 4px; }
    .parts-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .part-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-bottom: 1px solid rgba(255,255,255,.03);
      transition: background .1s;
    }
    .part-row:hover { background: rgba(255,255,255,.025); }

    .swatch {
      width: 13px; height: 13px;
      border-radius: 3px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,.12);
    }
    .part-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }
    .part-name.unnamed { color: var(--text-dim); font-style: italic; }

    .mat-select {
      width: 170px;
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236070a0' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 8px center;
      padding-right: 26px;
    }
    .mat-select:focus { outline: none; border-color: var(--accent); }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-dim);
      font-size: 12px;
      padding: 32px;
      text-align: center;
    }

    /* Code pane */
    .code-pane {
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .code-hdr {
      padding: 9px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }
    .code-hdr .section-label { margin: 0; }

    pre#code-output {
      padding: 12px 16px;
      font-size: 11px;
      line-height: 1.65;
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, monospace;
      color: var(--text-code);
      background: #06080f;
      height: 196px;
      overflow-y: auto;
      overflow-x: auto;
      white-space: pre;
      flex-shrink: 0;
    }
    pre#code-output::-webkit-scrollbar { width: 4px; height: 4px; }
    pre#code-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Syntax colour hints */
    .kw  { color: #8888ff; }
    .str { color: #a8d8a0; }
    .key { color: #88c8e8; }
    .cmt { color: #404860; font-style: italic; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--green); color: #000;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 13px; font-weight: 600;
      opacity: 0;
      transition: opacity .2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.webgpu.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

<header>
  <div>
    <div class="header-title">Uguisu — Material Mapper</div>
    <div class="header-sub">Drop a .glb, assign materials, copy the generated MATERIAL_RULES into viewer.html</div>
  </div>
  <div class="header-actions">
    <label>
      <input type="file" id="file-input" accept=".glb,.gltf" style="display:none">
      <span class="btn btn-ghost">Open .glb / .gltf</span>
    </label>
    <button class="btn btn-accent" id="reset-btn" style="display:none">Reset all</button>
  </div>
</header>

<div class="layout">

  <!-- 3D viewer -->
  <div class="viewer-pane" id="viewer-pane">
    <div id="canvas-container"></div>
    <div class="drop-overlay" id="drop-overlay">
      <div class="drop-icon">◈</div>
      <div class="drop-title">Drop a .glb or .gltf file here</div>
      <div class="drop-hint">or use the Open button above</div>
    </div>
  </div>

  <!-- Right panel -->
  <div class="panel">
    <div class="section-hdr">
      <span class="section-label">Parts</span>
      <span class="part-count" id="part-count"></span>
    </div>

    <div class="parts-list" id="parts-list">
      <div class="empty-state" id="empty-state">
        <span>No model loaded</span>
        <span style="color:#2a3050">Drop a .glb to see parts</span>
      </div>
    </div>

    <div class="code-pane">
      <div class="code-hdr">
        <span class="section-label">Generated MATERIAL_RULES</span>
        <button class="btn btn-accent" id="copy-btn" style="padding:4px 12px; font-size:11px;">Copy</button>
      </div>
      <pre id="code-output"><span class="cmt">// Load a model first</span></pre>
    </div>
  </div>

</div>

<div id="toast">Copied to clipboard!</div>

<script type="module">
'use strict';

import * as THREE     from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';

// ─────────────────────────────────────────────────────────────
// Renderer
// ─────────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer  = new THREE.WebGPURenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);
await renderer.init();

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x080a12);

const camera = new THREE.PerspectiveCamera(38, 1, 0.0001, 1000);
camera.position.set(0, 0, 1);
camera.lookAt(0, 0, 0);

// ─────────────────────────────────────────────────────────────
// Lighting — identical to viewer.html
// ─────────────────────────────────────────────────────────────
const keyLight = new THREE.DirectionalLight(0xfff4e0, 2.8);
keyLight.position.set(1.5, 2.5, 2);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xbbd4ff, 0.7);
fillLight.position.set(-1.5, -1, 1);
scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0xffffff, 1.4);
rimLight.position.set(0, 0.5, -3);
scene.add(rimLight);
scene.add(new THREE.HemisphereLight(0x22334c, 0x120c1c, 0.45));

// ─────────────────────────────────────────────────────────────
// OrbitControls
// ─────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping   = true;
controls.dampingFactor   = 0.06;
controls.autoRotate      = true;
controls.autoRotateSpeed = 0.7;

// ─────────────────────────────────────────────────────────────
// Resize observer
// ─────────────────────────────────────────────────────────────
new ResizeObserver(() => {
    const w = container.clientWidth, h = container.clientHeight;
    if (!w || !h) return;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
}).observe(container);

// ─────────────────────────────────────────────────────────────
// Render loop
// ─────────────────────────────────────────────────────────────
renderer.setAnimationLoop(() => {
    controls.update();
    renderer.renderAsync(scene, camera);
});

// ─────────────────────────────────────────────────────────────
// Material catalogue
// Mirrors viewer.html exactly — the generated code references
// the const names (e.g. `housingMat`), not the objects.
// ─────────────────────────────────────────────────────────────
const LED_COLOR = new THREE.Color(0, 1.0, 0.27);

const MAT_DEFS = {
    housingMat: {
        label:  'Housing — frosted plastic',
        swatch: '#2a2e4a',
        mat: new THREE.MeshPhysicalMaterial({
            color: 0x181b2a, roughness: 0.50, metalness: 0.00,
            transmission: 0.22, thickness: 0.009, ior: 1.49,
            transparent: true, side: THREE.DoubleSide,
        }),
    },
    buttonMat: {
        label:  'Button — glossy plastic',
        swatch: '#3a3e58',
        mat: new THREE.MeshPhysicalMaterial({
            color: 0x23263a, roughness: 0.18, metalness: 0.04,
        }),
    },
    ledMat: {
        label:  'LED die — emissive',
        swatch: '#00ff45',
        mat: new THREE.MeshStandardMaterial({
            color: LED_COLOR.clone(), emissive: LED_COLOR.clone(),
            emissiveIntensity: 4.0, roughness: 0.10, metalness: 0.00,
            toneMapped: false,
        }),
    },
    ledCapMat: {
        label:  'LED cap — frosted diffuser',
        swatch: '#c8d8ff',
        mat: new THREE.MeshPhysicalMaterial({
            color: 0xffffff, roughness: 0.60,
            transmission: 0.80, thickness: 0.001, ior: 1.50,
            transparent: true, opacity: 0.88, toneMapped: false,
        }),
    },
    pcbMat: {
        label:  'PCB — FR4 green',
        swatch: '#1b3a1e',
        mat: new THREE.MeshStandardMaterial({
            color: 0x1b3a1e, roughness: 0.88, metalness: 0.08,
        }),
    },
    metalMat: {
        label:  'Metal — brass / contacts',
        swatch: '#b8a870',
        mat: new THREE.MeshStandardMaterial({
            color: 0xb8a870, roughness: 0.22, metalness: 0.92,
        }),
    },
    rubberMat: {
        label:  'Rubber — gasket / grip',
        swatch: '#2a2a2a',
        mat: new THREE.MeshStandardMaterial({
            color: 0x101010, roughness: 0.96, metalness: 0.00,
        }),
    },
    _keep: {
        label:  '— keep original (from Onshape) —',
        swatch: null,
        mat:    null,
    },
};

// ─────────────────────────────────────────────────────────────
// State
// key = unique display name (deduped), value = { mesh, origMat, assignedKey }
// ─────────────────────────────────────────────────────────────
let partMap     = new Map();    // display-name → entry
let loadedModel = null;

// ─────────────────────────────────────────────────────────────
// Keyword-guess heuristic (same patterns as viewer.html)
// ─────────────────────────────────────────────────────────────
function guessKey(name) {
    const n = name.toLowerCase();
    if (/led|rgb|emitter|die/.test(n))                              return 'ledMat';
    if (/diffuser|lens|cap|dome/.test(n))                           return 'ledCapMat';
    if (/button|btn|trigger|key/.test(n))                           return 'buttonMat';
    if (/pcb|board|substrate|fr4/.test(n))                          return 'pcbMat';
    if (/clip|spring|pin|contact|metal|brass|steel|screw|nut/.test(n)) return 'metalMat';
    if (/rubber|gasket|seal|grip/.test(n))                          return 'rubberMat';
    return 'housingMat';
}

// ─────────────────────────────────────────────────────────────
// Apply currently-selected materials to 3D meshes
// ─────────────────────────────────────────────────────────────
function applyMaterials() {
    for (const entry of partMap.values()) {
        const def = MAT_DEFS[entry.assignedKey];
        entry.mesh.material = def.mat ?? entry.origMat;
    }
}

// ─────────────────────────────────────────────────────────────
// Build the right-panel parts list
// ─────────────────────────────────────────────────────────────
function buildPartsUI() {
    const list  = document.getElementById('parts-list');
    const empty = document.getElementById('empty-state');
    empty.style.display = 'none';
    [...list.querySelectorAll('.part-row')].forEach(el => el.remove());
    document.getElementById('part-count').textContent = `${partMap.size} part${partMap.size !== 1 ? 's' : ''}`;
    document.getElementById('reset-btn').style.display = '';

    for (const [displayName, entry] of partMap) {
        const row = document.createElement('div');
        row.className = 'part-row';

        // Colour swatch
        const swatch = document.createElement('div');
        swatch.className = 'swatch';
        updateSwatch(swatch, entry.assignedKey);

        // Part name
        const label = document.createElement('div');
        label.className = 'part-name' + (displayName.startsWith('(') ? ' unnamed' : '');
        label.textContent = displayName;
        label.title       = displayName;

        // Material selector
        const sel = document.createElement('select');
        sel.className = 'mat-select';
        for (const [key, def] of Object.entries(MAT_DEFS)) {
            const opt = document.createElement('option');
            opt.value       = key;
            opt.textContent = def.label;
            if (key === entry.assignedKey) opt.selected = true;
            sel.appendChild(opt);
        }
        sel.addEventListener('change', () => {
            entry.assignedKey = sel.value;
            updateSwatch(swatch, sel.value);
            applyMaterials();
            updateCode();
        });

        row.appendChild(swatch);
        row.appendChild(label);
        row.appendChild(sel);
        list.appendChild(row);
    }

    updateCode();
}

function updateSwatch(el, key) {
    const swatch = MAT_DEFS[key]?.swatch;
    if (swatch) {
        el.style.background = swatch;
        el.style.border     = '1px solid rgba(255,255,255,.14)';
    } else {
        el.style.background = 'transparent';
        el.style.border     = '1px dashed #404060';
    }
}

// ─────────────────────────────────────────────────────────────
// Generate MATERIAL_RULES code
// ─────────────────────────────────────────────────────────────
function updateCode() {
    const lines = [];
    for (const [displayName, entry] of partMap) {
        if (entry.assignedKey === '_keep') continue;
        const safe = displayName.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        lines.push(`    { match: '${safe}',`.padEnd(42) + ` mat: ${entry.assignedKey} },`);
    }

    const pre = document.getElementById('code-output');
    if (lines.length === 0) {
        pre.innerHTML = `<span class="cmt">// No parts mapped yet</span>`;
        return;
    }

    const catchAll = `    { match: /.*/, mat: housingMat },`;
    const codeLines = [
        `<span class="kw">const</span> <span class="key">MATERIAL_RULES</span> = [`,
        `<span class="cmt">    // ── Exact part names from your Onshape model ───────────</span>`,
        ...lines.map(l => escapeHtml(l)),
        ``,
        `<span class="cmt">    // ── Catch-all (must be last) ────────────────────────────</span>`,
        `    { match: <span class="str">/\\.*/</span>, mat: housingMat },`,
        `];`,
    ];
    pre.innerHTML = codeLines.join('\n');
}

function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─────────────────────────────────────────────────────────────
// Copy button
// ─────────────────────────────────────────────────────────────
document.getElementById('copy-btn').addEventListener('click', () => {
    const lines = [];
    for (const [displayName, entry] of partMap) {
        if (entry.assignedKey === '_keep') continue;
        const safe = displayName.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        lines.push(`    { match: '${safe}',`.padEnd(42) + ` mat: ${entry.assignedKey} },`);
    }
    const code = [
        'const MATERIAL_RULES = [',
        '    // ── Exact part names from your Onshape model ───────────',
        ...lines,
        '',
        '    // ── Catch-all (must be last) ────────────────────────────',
        '    { match: /.*/, mat: housingMat },',
        '];',
    ].join('\n');

    navigator.clipboard.writeText(code).then(() => showToast('Copied to clipboard!'));
});

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

// ─────────────────────────────────────────────────────────────
// Reset button
// ─────────────────────────────────────────────────────────────
document.getElementById('reset-btn').addEventListener('click', () => {
    for (const entry of partMap.values()) {
        entry.assignedKey = guessKey(entry.origName ?? '');
    }
    applyMaterials();
    buildPartsUI();
});

// ─────────────────────────────────────────────────────────────
// GLTF loading
// ─────────────────────────────────────────────────────────────
const loader = new GLTFLoader();

function loadBuffer(buffer, fileName) {
    loader.parse(buffer, '', (gltf) => {
        if (loadedModel) scene.remove(loadedModel);
        partMap.clear();

        const model = gltf.scene;
        const nameCounts = {};   // track duplicates

        model.traverse((child) => {
            if (!child.isMesh) return;
            const raw = child.name?.trim() || '';

            // Build a unique display name
            let displayName = raw || '(unnamed)';
            if (nameCounts[displayName] === undefined) {
                nameCounts[displayName] = 0;
            } else {
                nameCounts[displayName]++;
                displayName = `${displayName} (${nameCounts[displayName]})`;
            }

            partMap.set(displayName, {
                mesh:        child,
                origMat:     child.material,
                origName:    raw,
                assignedKey: guessKey(raw),
            });
        });

        // Normalise model to fit view
        const box    = new THREE.Box3().setFromObject(model);
        const size   = box.getSize(new THREE.Vector3());
        const centre = box.getCenter(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const scale  = 1.0 / maxDim;           // fit to unit cube
        model.scale.setScalar(scale);
        model.position.sub(centre.multiplyScalar(scale));

        scene.add(model);
        loadedModel = model;

        // Frame camera
        controls.reset();
        camera.position.set(0, 0.15, 2.5);
        camera.lookAt(0, 0, 0);
        controls.update();

        document.getElementById('drop-overlay').classList.add('hidden');
        document.title = `Material Mapper — ${fileName}`;

        applyMaterials();
        buildPartsUI();

    }, (err) => {
        console.error('GLTF parse error:', err);
        alert('Could not load model: ' + (err?.message ?? String(err)));
    });
}

// ─────────────────────────────────────────────────────────────
// File input
// ─────────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    file.arrayBuffer().then(buf => loadBuffer(buf, file.name));
    e.target.value = '';   // allow re-selecting the same file
});

// ─────────────────────────────────────────────────────────────
// Drag & drop on the viewer pane
// ─────────────────────────────────────────────────────────────
const viewerPane    = document.getElementById('viewer-pane');
const dropOverlay   = document.getElementById('drop-overlay');

viewerPane.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropOverlay.classList.add('drag-active');
});
viewerPane.addEventListener('dragleave', () => {
    dropOverlay.classList.remove('drag-active');
});
viewerPane.addEventListener('drop', (e) => {
    e.preventDefault();
    dropOverlay.classList.remove('drag-active');
    const file = e.dataTransfer.files[0];
    if (!file) return;
    file.arrayBuffer().then(buf => loadBuffer(buf, file.name));
});

dropOverlay.addEventListener('click', () => {
    document.getElementById('file-input').click();
});

</script>
</body>
</html>
