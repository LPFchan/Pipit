<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: radial-gradient(ellipse at 50% 38%, #1c1e28 0%, #09090c 100%); }
    canvas { display: block; }
    #status { position: absolute; top: 80px; left: 10px; color: white; z-index: 999; font-size: 11px; pointer-events: none; }
  </style>

  <script>
    window.onerror = function(msg, url, line, col, error) {
      document.body.innerHTML += '<div style="position:absolute;top:0;z-index:999;background:rgba(200,0,0,.85);color:white;padding:8px;font-size:11px;">Err: ' + msg + '</div>';
      return false;
    };
    window.addEventListener("unhandledrejection", function(e) {
      document.body.innerHTML += '<div style="position:absolute;top:36px;z-index:999;background:rgba(100,0,120,.85);color:white;padding:8px;font-size:11px;">Promise: ' + (e.reason ? e.reason.message : "?") + '</div>';
    });
  </script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<div id="status">Loading...</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { MATERIAL_RULES, LED_MAX_INTENSITY } from './materials.js';

const statusEl = document.getElementById('status');
statusEl.innerText = 'Initializing...';

// ─── Renderer ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
renderer.setClearColor(0x000000, 0); // transparent — CSS gradient shows through
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ─── Scene / Camera ──────────────────────────────────────────────────────────
const scene = new THREE.Scene();

// ─── Environment (IBL) ───────────────────────────────────────────────────────
// Procedural RoomEnvironment gives physically-based reflections and diffuse
// lighting on PBR materials without requiring an external HDR file.
const pmremGenerator = new THREE.PMREMGenerator(renderer);
const roomEnv = new RoomEnvironment();
const envTexture = pmremGenerator.fromScene(roomEnv, 0.04).texture;
scene.environment = envTexture;
roomEnv.dispose();
pmremGenerator.dispose();

// Seed camera at final position so OrbitControls has a non-zero spherical
// offset from frame 1 (prevents a degenerate ortho frustum at startup).
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.0001, 1000);
camera.position.set(-0.0000, -1.8538, -2.9860);

// Orthographic camera — mirrors perspective camera; toggled by USE_ORTHO.
const orthoCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.0001, 1000);
let USE_ORTHO = true;

function syncOrthoCamera() {
    const dist = Math.max(0.001, camera.position.distanceTo(controls.target));
    const halfH = Math.tan(THREE.MathUtils.degToRad(camera.fov / 2)) * dist;
    const asp   = window.innerWidth / window.innerHeight;
    orthoCamera.left   = -halfH * asp;
    orthoCamera.right  =  halfH * asp;
    orthoCamera.top    =  halfH;
    orthoCamera.bottom = -halfH;
    orthoCamera.near   = camera.near;
    orthoCamera.far    = camera.far;
    orthoCamera.position.copy(camera.position);
    orthoCamera.quaternion.copy(camera.quaternion);
    orthoCamera.updateProjectionMatrix();
}

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
// Native touches never reach WebView (Swift overlay intercepts them).
// Disable OrbitControls so controls.update() never overrides manual camera state.
controls.enabled = false;

// ─── Pan / Zoom / Auto-return ─────────────────────────────────────────────────
// Camera is driven entirely from Swift gesture recognizers via orbitCamera() /
// zoomCamera(). After RETURN_DELAY_MS of inactivity the camera smoothly eases
// back to the home position recorded at model-load time.
const HOME_CAM_POS     = new THREE.Vector3();
const HOME_CTRL_TARGET = new THREE.Vector3();
let _homeSet       = false;   // set true once model loaded & home position saved
let _manualCamera  = false;   // true after model loads; skips controls.update()
let _returning     = false;
let _returnFrom    = { pos: null, target: null };
let _returnStartTs = null;
let _returnTimerId = null;

const RETURN_DELAY_MS = 1000;  // ms of inactivity before returning to home
const RETURN_ANIM_MS  = 700;   // duration of the ease-out return animation

function _easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

// Cancels any in-progress or scheduled return so pan/zoom resume cleanly.
function _interruptReturn() {
    if (_returnTimerId) { clearTimeout(_returnTimerId); _returnTimerId = null; }
    _returning     = false;
    _returnFrom    = { pos: null, target: null };
    _returnStartTs = null;
}

// Called after every pan/zoom event; restarts the idle countdown.
function _scheduleReturn() {
    _interruptReturn();
    if (!_homeSet) return;
    _returnTimerId = setTimeout(() => {
        _returnTimerId = null;
        _returning  = true;
        _returnFrom = { pos: camera.position.clone(), target: controls.target.clone() };
        _returnStartTs = null;
    }, RETURN_DELAY_MS);
}

// ─── Lights ──────────────────────────────────────────────────────────────────
// IBL handles ambient diffuse; directional lights add specular highlights and
// cast shadows. Intensities are lower than without IBL to avoid overexposure.
const keyLight = new THREE.DirectionalLight(0xfff8f0, 2.0);
keyLight.position.set(1.5, 2.5, 2);
keyLight.castShadow = true;
keyLight.shadow.mapSize.setScalar(2048);
keyLight.shadow.camera.near = 0.1;
keyLight.shadow.camera.far = 10;
keyLight.shadow.camera.left   = -2;
keyLight.shadow.camera.right  =  2;
keyLight.shadow.camera.top    =  2;
keyLight.shadow.camera.bottom = -2;
keyLight.shadow.radius = 4;        // soft penumbra
keyLight.shadow.bias   = -0.0005;
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xb0c8ff, 0.55);
fillLight.position.set(-2, 1, -1.5);
scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0xdde8ff, 0.45);
rimLight.position.set(0, -1, -2);
scene.add(rimLight);
scene.add(new THREE.AmbientLight(0xffffff, 0.1));

// ─── Shadow-catcher floor ─────────────────────────────────────────────────────
// Receives the key-light shadow only; transparent so the gradient BG shows.
const groundPlane = new THREE.Mesh(
    new THREE.CircleGeometry(1.4, 64),
    new THREE.ShadowMaterial({ opacity: 0.38, transparent: true })
);
groundPlane.rotation.x = -Math.PI / 2;
groundPlane.position.y = -0.52;   // updated to exact model bottom after load
groundPlane.receiveShadow = true;
scene.add(groundPlane);

// ─── Placeholder cube (removed once GLB loads) ───────────────────────────────
const cubeGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
const cubeMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
const cube    = new THREE.Mesh(cubeGeo, cubeMat);
scene.add(cube);
statusEl.innerText = 'WebGL ready, loading model...';

// ─── API state ────────────────────────────────────────────────────────────────
let modelPivot      = null;   // Wrapper Group — setModelTransform acts on this
let rootModel       = null;   // The raw GLTF scene (centred + scaled inside modelPivot)
let ledMeshes       = [];     // Mesh objects whose material carries an emissive component
let buttonObject    = null;   // Object3D for the physical button cap (KEY1)
let buttonRestPos   = new THREE.Vector3();
// Button travel axis in rootModel local space.
// KiCAD +Z points up (out of PCB surface toward user); pressing the cap moves in +Z.
// After the 180° Z-rotation applied to rootModel, +Z local still maps to +Z world
// (Z-rotation preserves the Z axis), which is "away from camera" = into the device. ✓
let buttonPressAxis = new THREE.Vector3(0, 0, 1);


// Button physical travel calibrated from GLB bounding box:
//   model longest dim (Y) = 54.4 mm (raw GLB metres), normalised to unit cube.
//   0.3 mm physical travel → 0.3 / 54.4 = 0.005515 normalised units.
const BUTTON_TRAVEL = 0.005515;


// ─── GLB loader ──────────────────────────────────────────────────────────────
const loader = new GLTFLoader();
loader.load(
    'local://app/Uguisu.glb',
    (gltf) => {
        scene.remove(cube);
        rootModel = gltf.scene;

        // Normalise to unit cube — same convention as material-mapper.
        // This guarantees the calibrated camera parameters are valid regardless of export units.
        const box    = new THREE.Box3().setFromObject(rootModel);
        const center = box.getCenter(new THREE.Vector3());
        const size   = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        rootModel.scale.setScalar(1.0 / maxDim);
        rootModel.position.sub(center.multiplyScalar(1.0 / maxDim));

        // Wrap in pivot so setModelTransform can freely reposition / rotate the model
        // without overwriting the centring offset stored in rootModel.position.
        modelPivot = new THREE.Group();
        modelPivot.add(rootModel);
        scene.add(modelPivot);

        // ── Camera (exported from material-mapper) ────────────────────────────
        USE_ORTHO = false;
        camera.fov = 50;
        camera.updateProjectionMatrix();
        camera.position.set(-0.0000, -1.2865, -2.6566);
        controls.target.set(0.0000, 0.0000, 0.0000);
        controls.update();
        if (USE_ORTHO) syncOrthoCamera();

        // Save home state and switch to manual camera management (no more
        // controls.update() calls; pan/zoom/return drive the camera directly).
        HOME_CAM_POS.copy(camera.position);
        HOME_CTRL_TARGET.copy(controls.target);
        _homeSet      = true;
        _manualCamera = true;

        // ── Model rotation (exported from material-mapper) ────────────────────
        rootModel.rotation.set(0.000000, 0.000000, 0.000000); // 0° 0° 0°

        // ── Apply materials ───────────────────────────────────────────────────
        rootModel.traverse((obj) => {
            if (!obj.isMesh) return;
            // Material mapper groups by parent Group name (Onshape/KiCAD Layout A) or by the
            // mesh's own name (Layout B / flat).  Mirror that same name-selection here so the
            // MATERIAL_RULES keys always resolve to the right mesh.
            const isParentRoot = !obj.parent || obj.parent === rootModel;
            const nameToMatch  = (!isParentRoot && obj.parent.name) ? obj.parent.name : obj.name;
            const rule = MATERIAL_RULES.find(r =>
                typeof r.match === 'string' ? nameToMatch === r.match : r.match.test(nameToMatch));
            if (rule) { obj.material = rule.mat; obj.material.needsUpdate = true; }
        });

        // ── Find LED meshes (by name, after material application) ─────────────
        const LED_NAMES = new Set(['LED', 'LED_1', 'LED_2', 'LED_3', 'LED-SMD_6P-L50-W50-TL_TC5050RGBF08_1']);
        rootModel.traverse((obj) => {
            if (!obj.isMesh) return;
            const isParentRoot = !obj.parent || obj.parent === rootModel;
            const nameToMatch  = (!isParentRoot && obj.parent.name) ? obj.parent.name : obj.name;
            if (LED_NAMES.has(nameToMatch)) {
                ledMeshes.push(obj);
                console.log('[Pipit] LED mesh:', nameToMatch);
            }
        });

        // Ensure LED starts OFF; Swift drives state via setLedState after modelReady.
        _applyLedState(0, 0, 0, false, 1.0);

        // ── Enable shadows on all meshes ─────────────────────────────────────
        rootModel.traverse((obj) => {
            if (obj.isMesh) { obj.castShadow = true; obj.receiveShadow = true; }
        });
        // Snap shadow-catcher floor to the exact bottom of the normalised model.
        const modelBox = new THREE.Box3().setFromObject(modelPivot);
        groundPlane.position.y = modelBox.min.y - 0.008;

        // ── Find button object ────────────────────────────────────────────────
        // KiCAD reference designator for the ALPS SKQGABE010 tactile switch is KEY1.
        const candidateNames = [
            'KEY1', 'SW1', 'SKQGABE010',
            'KEY-SMD_4P-L5.2-W5.2-H1.5-LS6.4-P3.70',
            'button', 'Button', 'KEY_SMD',
        ];
        for (const name of candidateNames) {
            buttonObject = rootModel.getObjectByName(name);
            if (buttonObject) {
                console.log('[Pipit] Button node found:', name);
                break;
            }
        }
        if (!buttonObject) {
            console.warn('[Pipit] Button node not found. Available named nodes:');
            rootModel.traverse((obj) => { if (obj.name) console.log('  •', obj.name); });
        } else {
            buttonRestPos.copy(buttonObject.position);
        }

        statusEl.style.display = 'none';
        console.log('[Pipit] Model loaded. LED meshes:', ledMeshes.length,
            '| Button:', buttonObject ? buttonObject.name : 'NOT FOUND');

        // Notify Swift: model is ready, APIs will now work.
        if (window.webkit?.messageHandlers?.modelReady) {
            window.webkit.messageHandlers.modelReady.postMessage(null);
        }
    },
    undefined,
    (err) => {
        statusEl.innerText = 'Load error: ' + err.message;
        statusEl.style.color = 'orange';
        console.error('[Pipit] GLB load error', err);
    }
);

// ─── Internal helpers ─────────────────────────────────────────────────────────

function _applyLedState(r, g, b, active, brightness) {
    const color     = new THREE.Color(r / 255, g / 255, b / 255);
    const intensity = active ? brightness * LED_MAX_INTENSITY : 0.0;
    for (const mesh of ledMeshes) {
        const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
        for (const mat of mats) {
            if (!mat || mat.emissive === undefined) continue;
            mat.emissive.copy(color);
            mat.emissiveIntensity = intensity;
            mat.needsUpdate = true;
        }
    }
}

// ─── LED animation engine (mirrors firmware led_effects.h) ─────────────────────
// Generation counter invalidates stale RAF callbacks on cancel.
let _ledGeneration = 0;
let _ledRafId      = null;

function _cancelLedAnim() {
    _ledGeneration++;
    if (_ledRafId !== null) { cancelAnimationFrame(_ledRafId); _ledRafId = null; }
}

// Run an array of phase objects: { type:'fade_in'|'hold'|'fade_out'|'off', r, g, b, ms }
// Calls onDone when all phases complete. Cancels any previously running animation.
function _playPhases(phases, onDone) {
    _cancelLedAnim();
    const gen = _ledGeneration;
    let i = 0, phaseStart = null;
    function frame(ts) {
        if (_ledGeneration !== gen) return;
        if (i >= phases.length) {
            _applyLedState(0, 0, 0, false, 1.0);
            _ledRafId = null;
            if (onDone) onDone();
            return;
        }
        const p  = phases[i];
        if (phaseStart === null) phaseStart = ts;
        const t  = Math.min((ts - phaseStart) / p.ms, 1.0);
        const br = p.type === 'fade_in'  ? t
                 : p.type === 'hold'     ? 1.0
                 : p.type === 'fade_out' ? 1.0 - t
                 :                         0.0;
        if (br > 0) _applyLedState(p.r, p.g, p.b, true, br);
        else        _applyLedState(0, 0, 0, false, 1.0);
        if (t >= 1.0) { i++; phaseStart = null; }
        _ledRafId = requestAnimationFrame(frame);
    }
    _ledRafId = requestAnimationFrame(frame);
}

// Mirrors led::flash_once(pin, rise_ms, hold_ms, fall_ms)
function _flashOnce(r, g, b, riseMs, holdMs, fallMs, onDone) {
    _playPhases([
        { type: 'fade_in',  r, g, b, ms: riseMs  },
        { type: 'hold',     r, g, b, ms: holdMs  },
        { type: 'fade_out', r, g, b, ms: fallMs  },
    ], onDone);
}

// Mirrors led::pulse_blink(pin, rise, hold, fall, off, total_ms)
function _pulseBlink(r, g, b, riseMs, holdMs, fallMs, offMs, totalMs, onDone) {
    const deadline = performance.now() + totalMs;
    function iteration() {
        if (performance.now() >= deadline) {
            _applyLedState(0, 0, 0, false, 1.0);
            if (onDone) onDone();
            return;
        }
        _playPhases([
            { type: 'fade_in',  r, g, b, ms: riseMs },
            { type: 'hold',     r, g, b, ms: holdMs },
            { type: 'fade_out', r, g, b, ms: fallMs },
            { type: 'off',      r: 0, g: 0, b: 0,   ms: offMs  },
        ], iteration);
    }
    iteration();
}

// Mirrors led::rainbow_sweep(total_ms, fade_ms) — full HSV hue rotation with
// a fade-in / fade-out brightness envelope matching the firmware.
function _rainbowSweep(totalMs, fadeMs, onDone) {
    fadeMs = (fadeMs !== undefined) ? fadeMs : 200;
    _cancelLedAnim();
    const gen = _ledGeneration;
    let startTs = null;
    function frame(ts) {
        if (_ledGeneration !== gen) return;
        if (startTs === null) startTs = ts;
        const elapsed = ts - startTs;
        if (elapsed >= totalMs) {
            _applyLedState(0, 0, 0, false, 1.0);
            _ledRafId = null;
            if (onDone) onDone();
            return;
        }
        // Brightness envelope: fade in, hold, fade out.
        let brightness;
        if (elapsed < fadeMs) {
            brightness = elapsed / fadeMs;
        } else if (elapsed > totalMs - fadeMs) {
            brightness = (totalMs - elapsed) / fadeMs;
        } else {
            brightness = 1.0;
        }
        // Hue advances linearly over totalMs.
        const hue    = (elapsed / totalMs) * 360;
        const sector = Math.floor(hue / 60);
        const frac   = Math.floor((hue % 60) * 255 / 60);
        let r, g, b;
        switch (sector) {
            case 0: r=255;       g=frac;      b=0;        break; // R→Y
            case 1: r=255-frac;  g=255;       b=0;        break; // Y→G
            case 2: r=0;         g=255;       b=frac;     break; // G→C
            case 3: r=0;         g=255-frac;  b=255;      break; // C→B
            case 4: r=frac;      g=0;         b=255;      break; // B→M
            default:r=255;       g=0;         b=255-frac; break; // M→R
        }
        _applyLedState(r, g, b, true, brightness);
        _ledRafId = requestAnimationFrame(frame);
    }
    _ledRafId = requestAnimationFrame(frame);
}

// ─── Public JS API (called from Swift via WKWebView.evaluateJavaScript) ───────

/**
 * Set the RGB LED emissive state instantly (no animation).
 * @param {number}  r          0–255
 * @param {number}  g          0–255
 * @param {number}  b          0–255
 * @param {boolean} active     true = LED lit, false = LED off
 * @param {number}  brightness 0.0–1.0
 */
window.setLedState = (r, g, b, active, brightness) => {
    _cancelLedAnim();
    _applyLedState(r, g, b, active, brightness);
};

/**
 * Play the Unlock green flash — mirrors firmware led::flash_unlock().
 * Green (0,255,0): fade-in 300 ms → hold 150 ms → fade-out 300 ms.
 */
window.playLedUnlock = () => _flashOnce(0, 255, 0, 300, 150, 300);

/**
 * Play the Lock red flash — mirrors firmware led::flash_lock().
 * Red (255,0,0): fade-in 300 ms → hold 150 ms → fade-out 300 ms.
 */
window.playLedLock = () => _flashOnce(255, 0, 0, 300, 150, 300);

/**
 * Play the Window / triple-click rainbow sweep — mirrors firmware led::rainbow_sweep().
 * Full HSV hue rotation over 1500 ms.
 */
window.playLedWindow = () => _rainbowSweep(1500, 200);

/**
 * Start the provisioning pulsed-blue blink loop — mirrors firmware led::prov_pulse().
 * Blue (0,0,255): rise 500 ms → hold 200 ms → fall 500 ms → off 50 ms, repeating.
 * Call stopLedAnim() to cancel.
 */
window.startLedProv = () => {
    _cancelLedAnim();
    function loop() {
        _playPhases([
            { type: 'fade_in',  r:0, g:0, b:255, ms:500 },
            { type: 'hold',     r:0, g:0, b:255, ms:200 },
            { type: 'fade_out', r:0, g:0, b:255, ms:500 },
            { type: 'off',      r:0, g:0, b:0,   ms:50  },
        ], loop);
    }
    loop();
};

/**
 * Play a low-battery pulsed flash — mirrors firmware led::flash_low_battery().
 * timing: rise 120 ms → hold 100 ms → fall 120 ms → off 170 ms, for 2000 ms total.
 * @param {number} r  0–255 (default 255 = red; pass 0,255,0 for unlock+low-bat)
 * @param {number} g  0–255 (default 0)
 * @param {number} b  0–255 (default 0)
 */
window.playLedLowBat = (r = 255, g = 0, b = 0) => _pulseBlink(r, g, b, 120, 100, 120, 170, 2000);

/**
 * Cancel any running LED animation and turn the LED off immediately.
 */
window.stopLedAnim = () => {
    _cancelLedAnim();
    _applyLedState(0, 0, 0, false, 1.0);
};

/**
 * Physically depress the button geometry on the 3D model.
 * Maps to the ALPS SKQGABE010 (KEY1) tactile switch cap travel.
 * @param {number} depth  0.0 = resting / 1.0 = fully depressed (0.3 mm physical)
 */
window.setButtonDepth = (depth) => {
    if (!buttonObject) return;
    const travel = Math.max(0, Math.min(1, depth)) * BUTTON_TRAVEL;
    buttonObject.position.set(
        buttonRestPos.x + buttonPressAxis.x * travel,
        buttonRestPos.y + buttonPressAxis.y * travel,
        buttonRestPos.z + buttonPressAxis.z * travel
    );
};

/**
 * Apply position / scale / rotation to the model pivot.
 * Operates on the outer pivot group so the centring offset in rootModel stays intact.
 */
window.setModelTransform = (px, py, pz, scale, rx, ry, rz) => {
    if (!modelPivot) return;
    modelPivot.position.set(px, py, pz);
    modelPivot.scale.setScalar(scale);
    modelPivot.rotation.set(rx, ry, rz);
};

/**
 * Orbit the camera around the target by azimuth and polar angle deltas.
 * dTheta: horizontal rotation (radians); dPhi: vertical rotation (radians).
 * Called from Swift DragGesture with pixel deltas converted to radians.
 */
window.orbitCamera = (dTheta, dPhi) => {
    _scheduleReturn();
    const target = controls.target;
    const offset = camera.position.clone().sub(target);
    const radius = Math.max(0.001, offset.length());
    // Decompose current position into spherical angles.
    let theta = Math.atan2(offset.x, offset.z);
    let phi   = Math.acos(Math.max(-1, Math.min(1, offset.y / radius)));
    // Apply deltas; clamp phi away from poles to avoid gimbal flip.
    theta += dTheta;
    phi    = Math.max(0.05, Math.min(Math.PI - 0.05, phi + dPhi));
    camera.position.set(
        target.x + radius * Math.sin(phi) * Math.sin(theta),
        target.y + radius * Math.cos(phi),
        target.z + radius * Math.sin(phi) * Math.cos(theta)
    );
    camera.lookAt(target);
};

/**
 * Dolly the camera toward/away from the target.
 * factor > 1.0 = zoom in (decrease distance), < 1.0 = zoom out.
 * Called from Swift MagnificationGesture incremental deltas.
 */
window.zoomCamera = (factor) => {
    _scheduleReturn();
    camera.updateMatrixWorld();
    const dist    = camera.position.distanceTo(controls.target);
    const newDist = Math.max(0.3, Math.min(8.0, dist / factor));
    const lookDir = new THREE.Vector3();
    camera.getWorldDirection(lookDir);
    camera.position.copy(controls.target).addScaledVector(lookDir, -newDist);
};

// ─── Resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    if (USE_ORTHO) syncOrthoCamera();
});

// ─── Render loop ──────────────────────────────────────────────────────────────
renderer.setAnimationLoop(() => {
    if (cube.parent) {
        cube.rotation.x += 0.01;
        cube.rotation.y += 0.01;
    }
    if (_manualCamera) {
        // Eased return-to-home animation.
        if (_returning && _returnFrom.pos) {
            const now = performance.now();
            if (_returnStartTs === null) _returnStartTs = now;
            const rawT = Math.min((now - _returnStartTs) / RETURN_ANIM_MS, 1.0);
            const t    = _easeOutCubic(rawT);
            camera.position.lerpVectors(_returnFrom.pos,    HOME_CAM_POS,     t);
            controls.target.lerpVectors(_returnFrom.target, HOME_CTRL_TARGET, t);
            camera.lookAt(controls.target);
            if (rawT >= 1.0) {
                camera.position.copy(HOME_CAM_POS);
                controls.target.copy(HOME_CTRL_TARGET);
                camera.lookAt(controls.target);
                _returning = false;
            }
        }
    } else {
        controls.update();
    }
    if (USE_ORTHO) syncOrthoCamera();
    renderer.render(scene, USE_ORTHO ? orthoCamera : camera);
});
</script>
