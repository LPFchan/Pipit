<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { display: block; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

<body>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

try {

// ── Material definitions ───────────────────────────────────
const ledCapMat = new THREE.MeshPhysicalMaterial({
    color:                 0xffffff,
    roughness:             0.6,
    transmission:          0.8,
    thickness:             0.001,
    opacity:               0.88,
    transparent:           true,
    toneMapped:            false,
});

const housingMat = new THREE.MeshPhysicalMaterial({
    color:                 0xffffff,
    roughness:             0.51,
    thickness:             0.009,
    ior:                   1.49,
    transparent:           true,
    side:                  THREE.DoubleSide,
    polygonOffset:         true,
    polygonOffsetFactor:   -2.0,
    polygonOffsetUnits:    -2.0,
});

const metalMat = new THREE.MeshPhysicalMaterial({
    color:                 0xb8a870,
    roughness:             0.22,
    metalness:             0.92,
    polygonOffset:         true,
    polygonOffsetFactor:   -2.0,
    polygonOffsetUnits:    -2.0,
});

const buttonMat = new THREE.MeshPhysicalMaterial({
    color:                 0xffffff,
    roughness:             0.29,
    metalness:             0.04,
    transmission:          0.76,
    transparent:           true,
    polygonOffset:         true,
    polygonOffsetFactor:   -2.0,
    polygonOffsetUnits:    -2.0,
});

const rubberMat = new THREE.MeshPhysicalMaterial({
    color:                 0x101010,
    roughness:             0.96,
    polygonOffset:         true,
    polygonOffsetFactor:   -2.0,
    polygonOffsetUnits:    -2.0,
});

const ledMat = new THREE.MeshPhysicalMaterial({
    color:                 0x00ff45,
    emissive:              0x00ff45,
    emissiveIntensity:     7.7,
    roughness:             0.1,
    toneMapped:            false,
    polygonOffset:         true,
    polygonOffsetFactor:   -2.0,
    polygonOffsetUnits:    -2.0,
});

const pcbMat = new THREE.MeshPhysicalMaterial({
    color:                 0xbfbfbf,
    roughness:             0.88,
    metalness:             0.08,
    polygonOffset:         true,
    polygonOffsetFactor:   -2.0,
    polygonOffsetUnits:    -2.0,
});

// ── MATERIAL_RULES ─────────────────────────────────────────
const MATERIAL_RULES = [
    { match: 'Battery',                      mat: ledCapMat },
    { match: 'Uguisu_via',                   mat: housingMat },
    { match: 'Uguisu_pad',                   mat: metalMat },
    { match: 'Uguisu_pad_1',                 mat: metalMat },
    { match: 'Uguisu_pad_2',                 mat: metalMat },
    { match: 'Lid',                          mat: buttonMat },
    { match: 'Uguisu_via_1',                 mat: housingMat },
    { match: 'Uguisu_pad_3',                 mat: metalMat },
    { match: 'Body',                         mat: rubberMat },
    { match: 'KEY-SMD_4P-L52-W52-H15-LS64-P370', mat: housingMat },
    { match: 'COMPOUND',                     mat: housingMat },
    { match: 'LED',                          mat: ledMat },
    { match: 'Uguisu_via_2',                 mat: housingMat },
    { match: 'Uguisu_pad_4',                 mat: metalMat },
    { match: 'Uguisu_pad_5',                 mat: metalMat },
    { match: 'Uguisu_pad_6',                 mat: metalMat },
    { match: 'COMPOUND_1',                   mat: housingMat },
    { match: 'CAP_1',                        mat: rubberMat },
    { match: 'Body_1',                       mat: housingMat },
    { match: 'ANT1',                         mat: housingMat },
    { match: 'CHAMFER9',                     mat: metalMat },
    { match: 'Uguisu_pad_7',                 mat: metalMat },
    { match: 'COMPOUND_2',                   mat: housingMat },
    { match: 'Uguisu_PCB',                   mat: pcbMat },
    { match: 'Button',                       mat: buttonMat },
    { match: 'Pins',                         mat: metalMat },
    { match: 'KEY-SMD_4P-L52-W52-H15-LS64-P370_1', mat: housingMat },
    { match: 'COMPOUND_3',                   mat: housingMat },
    { match: 'LED_1',                        mat: ledMat },
    { match: 'Uguisu_via_3',                 mat: housingMat },
    { match: 'Uguisu_pad_8',                 mat: metalMat },
    { match: 'Uguisu_pad_9',                 mat: metalMat },
    { match: 'Uguisu_pad_10',                mat: metalMat },
    { match: 'COMPOUND_4',                   mat: housingMat },
    { match: 'COMPOUND_5',                   mat: housingMat },
    { match: 'CAP_1_1',                      mat: rubberMat },
    { match: 'ANT1_1',                       mat: housingMat },
    { match: 'BOSS-EXTRUDE14_1_',            mat: housingMat },
    { match: 'Uguisu_pad_11',                mat: metalMat },
    { match: 'Uguisu_pad_12',                mat: metalMat },
    { match: 'COMPOUND_6',                   mat: housingMat },
    { match: 'COMPOUND_7',                   mat: housingMat },
    { match: 'Uguisu_via_4',                 mat: housingMat },
    { match: 'Uguisu_via_5',                 mat: housingMat },
    { match: 'Uguisu_pad_13',                mat: metalMat },
    { match: 'Uguisu_pad_14',                mat: metalMat },
    { match: 'CUT-EXTRUDE5',                 mat: rubberMat },
    { match: 'LED-SMD_6P-L50-W50-TL_TC5050RGBF08', mat: pcbMat },
    { match: 'COMPOUND_8',                   mat: housingMat },
    { match: 'CAP_3',                        mat: rubberMat },
    { match: 'Uguisu_via_6',                 mat: housingMat },
    { match: 'Uguisu_pad_15',                mat: metalMat },
    { match: 'Uguisu_pad_16',                mat: metalMat },
    { match: 'Uguisu_pad_17',                mat: metalMat },
    { match: 'COMPOUND_9',                   mat: housingMat },
    { match: 'BOSS-EXTRUDE7_9_',             mat: housingMat },
    { match: 'Uguisu_pad_18',                mat: metalMat },
    { match: 'COMPOUND_10',                  mat: housingMat },
    { match: 'Uguisu_via_7',                 mat: housingMat },
    { match: 'Uguisu_pad_19',                mat: metalMat },
    { match: 'BOSS-EXTRUDE14_10_',           mat: housingMat },
    { match: 'Pins_1',                       mat: metalMat },
    { match: 'BOSS-EXTRUDE7_8_',             mat: housingMat },
    { match: 'KEY-SMD_4P-L52-W52-H15-LS64-P370_2', mat: housingMat },
    { match: 'COMPOUND_11',                  mat: housingMat },
    { match: 'USR',                          mat: rubberMat },
    { match: 'BOSS-EXTRUDE7_1_',             mat: housingMat },
    { match: 'Uguisu_pad_20',                mat: metalMat },
    { match: 'Uguisu_pad_21',                mat: metalMat },
    { match: 'Uguisu_pad_22',                mat: metalMat },
    { match: 'BOSS-EXTRUDE7_5_',             mat: housingMat },
    { match: 'BOSS-EXTRUDE14_8_',            mat: housingMat },
    { match: 'BOSS-EXTRUDE7_4_',             mat: housingMat },
    { match: 'BOSS-EXTRUDE7_3_',             mat: housingMat },
    { match: 'BOSS-EXTRUDE14_4_',            mat: housingMat },
    { match: 'BOSS-EXTRUDE14_2_',            mat: housingMat },
    { match: 'COMPOUND_12',                  mat: housingMat },
    { match: 'COMPOUND_13',                  mat: housingMat },
    { match: 'CAP_3_1',                      mat: rubberMat },
    { match: 'Pins_2',                       mat: metalMat },
    { match: 'BOSS-EXTRUDE7_6_',             mat: housingMat },
    { match: 'BOSS-EXTRUDE14_11_',           mat: housingMat },
    { match: 'Uguisu_pad_23',                mat: metalMat },
    { match: 'Uguisu_pad_24',                mat: metalMat },
    { match: 'KEY-SMD_4P-L52-W52-H15-LS64-P370_3', mat: metalMat },
    { match: 'COMPOUND_14',                  mat: housingMat },
    { match: 'R_0603_1608Metric',            mat: rubberMat },
    { match: 'Uguisu_pad_25',                mat: metalMat },
    { match: 'Uguisu_via_8',                 mat: housingMat },
    { match: 'Uguisu_pad_26',                mat: metalMat },
    { match: 'Uguisu_pad_27',                mat: metalMat },
    { match: 'BOSS-EXTRUDE7_7_',             mat: housingMat },
    { match: 'BOSS-EXTRUDE14_9_',            mat: housingMat },

    { match: 'BOSS-EXTRUDE14_7_',            mat: housingMat },
    { match: 'MIRROR2',                      mat: metalMat },
    { match: 'BOSS-EXTRUDE14_5_',            mat: housingMat },
    { match: 'BOSS-EXTRUDE14_12_',           mat: housingMat },
    { match: 'COMPOUND_15',                  mat: housingMat },
    { match: 'LED_2',                        mat: ledMat },
    { match: 'Uguisu_via_9',                 mat: housingMat },
    { match: 'Uguisu_pad_28',                mat: metalMat },
    { match: 'Uguisu_pad_29',                mat: metalMat },
    { match: 'Uguisu_pad_30',                mat: metalMat },
    { match: 'Uguisu_pad_31',                mat: metalMat },
    { match: 'COMPOUND_16',                  mat: housingMat },
    { match: 'Uguisu_via_10',                mat: housingMat },
    { match: 'Uguisu_pad_32',                mat: metalMat },
    { match: 'Pins_3',                       mat: metalMat },
    { match: 'KEY-SMD_4P-L52-W52-H15-LS64-P370_4', mat: metalMat },
    { match: 'COMPOUND_17',                  mat: rubberMat },
    { match: 'COMPOUND_18',                  mat: housingMat },
    { match: 'Uguisu_pad_33',                mat: metalMat },
    { match: 'Uguisu_pad_34',                mat: metalMat },
    { match: 'Uguisu_pad_35',                mat: metalMat },
    { match: 'Shield',                       mat: metalMat },
    { match: 'COMPOUND_19',                  mat: housingMat },
    { match: 'LED_3',                        mat: ledMat },
    { match: 'COMPOUND_20',                  mat: housingMat },
    { match: 'COMPOUND_21',                  mat: housingMat },
    { match: 'CAP_3_2',                      mat: rubberMat },
    { match: 'CAP',                          mat: rubberMat },
    { match: 'BOSS-EXTRUDE7_2_',             mat: housingMat },
    { match: 'Uguisu_pad_36',                mat: metalMat },
    { match: 'Uguisu_pad_37',                mat: metalMat },
    { match: 'Uguisu_pad_38',                mat: metalMat },
    { match: 'KEY-SMD_4P-L52-W52-H15-LS64-P370_5', mat: housingMat },
    { match: 'COMPOUND_22',                  mat: housingMat },
    { match: 'LED-SMD_6P-L50-W50-TL_TC5050RGBF08_1', mat: ledMat },
    { match: 'Uguisu_pad_39',                mat: metalMat },
    { match: 'Uguisu_via_11',                mat: housingMat },
    { match: 'Uguisu_pad_40',                mat: metalMat },
    { match: 'Uguisu_pad_41',                mat: metalMat },
    { match: 'COMPOUND_23',                  mat: housingMat },
    { match: 'ANT1_2',                       mat: rubberMat },
    { match: 'BOSS-EXTRUDE14_6_',            mat: housingMat },
    // Catch-all (must be last)
    { match: /.*/, mat: housingMat },
];

function applyMaterials(model) {
    model.traverse(child => {
        if (!child.isMesh) return;
        // Try parent group name first (Layout A: named parent), then mesh name (Layout B: flat)
        const candidates = [child.parent?.name, child.name].filter(Boolean);
        for (const name of candidates) {
            const rule = MATERIAL_RULES.find(r =>
                r.match instanceof RegExp ? r.match.test(name) : r.match === name
            );
            if (rule) { child.material = rule.mat; return; }
        }
    });
}

// ── Renderer ───────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.setClearColor(0x000000, 0);
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    if (USE_ORTHO) syncOrthoCamera();
});

// ── Scene / camera / controls ──────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(24, window.innerWidth / window.innerHeight, 0.0001, 1000);
// Orthographic camera — mirrors perspective camera; toggled by USE_ORTHO
const orthoCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.0001, 1000);
let USE_ORTHO = true;
function syncOrthoCamera() {
    const dist = camera.position.distanceTo(controls.target);
    const halfH = Math.tan(THREE.MathUtils.degToRad(camera.fov / 2)) * dist;
    const asp   = window.innerWidth / window.innerHeight;
    orthoCamera.left   = -halfH * asp;
    orthoCamera.right  =  halfH * asp;
    orthoCamera.top    =  halfH;
    orthoCamera.bottom = -halfH;
    orthoCamera.near   = camera.near;
    orthoCamera.far    = camera.far;
    orthoCamera.position.copy(camera.position);
    orthoCamera.quaternion.copy(camera.quaternion);
    orthoCamera.updateProjectionMatrix();
}

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;

// ── Lighting (matches material-mapper) ────────────────────
const keyLight = new THREE.DirectionalLight(0xfff4e0, 2.8);
keyLight.position.set(1.5, 2.5, 2);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xc8d8ff, 0.9);
fillLight.position.set(-2, 1, -1.5);
scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0xffffff, 0.6);
rimLight.position.set(0, -1, -2);
scene.add(rimLight);
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

// ── Load GLB ──────────────────────────────────────────────
const loader = new GLTFLoader();
loader.load(
    'local://app/Uguisu.glb',
    (gltf) => {
        const model = gltf.scene;

        // Normalise to unit cube — same convention as material-mapper
        const box    = new THREE.Box3().setFromObject(model);
        const size   = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        model.scale.setScalar(1.0 / maxDim);
        model.position.sub(center.multiplyScalar(1.0 / maxDim));

        applyMaterials(model);
        scene.add(model);

        // ── Camera ──
        camera.fov = 60;
        camera.updateProjectionMatrix();
        camera.position.set(-0.0000, -1.8538, -2.9860);
        controls.target.set(0.0000, 0.0000, 0.0000);
        controls.update();
        if (USE_ORTHO) syncOrthoCamera();

        // ── Model rotation ──
        model.rotation.set(0.000000, 0.000000, 3.141593); // 0° 0° 180°
    },
    undefined,
    (error) => {
        console.error('GLB_ERROR', error);
        document.body.innerHTML += '<div style="position:absolute;top:0;z-index:999;background:white;color:orange;padding:10px;">GLB Load Error: ' + error.message + '</div>';
    }
);

renderer.setAnimationLoop(() => {
    controls.update();
    if (USE_ORTHO) syncOrthoCamera();
    renderer.render(scene, USE_ORTHO ? orthoCamera : camera);
});

} catch(e) {
    document.body.innerHTML += '<div style="position:absolute;top:0;z-index:999;background:white;color:red;padding:10px;">Crash: ' + e.message + '</div>';
}
</script>
</body>
</html>
