<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { display: block; }
  </style>

  <!--
    Three.js r171 via CDN importmap.

    PRODUCTION / OFFLINE NOTE
    ─────────────────────────
    CDN imports work when the device has internet access. For fully offline
    or air-gapped builds:
      1. Download the following files and place them in assets/vendor/:
           three.webgpu.js          (build/three.webgpu.js from the npm package)
           three.webgpu.js.map
           jsm/controls/OrbitControls.js
           jsm/loaders/GLTFLoader.js
           jsm/loaders/RGBELoader.js
           jsm/tsl/display/PassNode.js
           jsm/tsl/display/BloomNode.js
      2. Change the importmap below to point at the local paths, e.g.:
           "three": "./vendor/three.webgpu.js"
           "three/addons/": "./vendor/jsm/"
  -->
  <script type="importmap">
  {
    "imports": {
      "three":          "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.webgpu.js",
      "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<script type="module">

'use strict';

import * as THREE from 'three';
import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }     from 'three/addons/loaders/GLTFLoader.js';
import { pass }           from 'three/addons/tsl/display/PassNode.js';
import { bloom }          from 'three/addons/tsl/display/BloomNode.js';

// ─────────────────────────────────────────────────────────────
// Renderer
// WebGPURenderer auto-falls back to WebGL 2 on older devices.
// `await renderer.init()` is MANDATORY before any render calls.
// ─────────────────────────────────────────────────────────────
const renderer = new THREE.WebGPURenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping        = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// Must resolve before any render calls
await renderer.init();

// ─────────────────────────────────────────────────────────────
// Scene & Camera
// ─────────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.001, 50);
camera.position.set(0, 0.04, 0.20);
camera.lookAt(0, 0, 0);

// ─────────────────────────────────────────────────────────────
// Lighting
// ─────────────────────────────────────────────────────────────
// Key light — warm overhead
const keyLight = new THREE.DirectionalLight(0xfff4e0, 2.8);
keyLight.position.set(1.5, 2.5, 2);
scene.add(keyLight);

// Soft cool fill from below-left
const fillLight = new THREE.DirectionalLight(0xbbd4ff, 0.7);
fillLight.position.set(-1.5, -1, 1);
scene.add(fillLight);

// Rim light from behind — creates edge highlight on the plastic housing
const rimLight = new THREE.DirectionalLight(0xffffff, 1.4);
rimLight.position.set(0, 0.5, -3);
scene.add(rimLight);

// Ambient hemisphere — dark teal sky, deep purple ground
scene.add(new THREE.HemisphereLight(0x22334c, 0x120c1c, 0.45));

// ─────────────────────────────────────────────────────────────
// LED runtime state
// ─────────────────────────────────────────────────────────────
const LED_EMISSIVE_INTENSITY = 6.0;   // HDR — intentionally > 1 for bloom
const LED_POINT_INTENSITY    = 3.5;
const LED_POINT_DISTANCE     = 0.10;

let ledR = 0, ledG = 1.0, ledB = 0.27;   // default: jade-green
let ledActive = true;

// ─────────────────────────────────────────────────────────────
// Materials
// ─────────────────────────────────────────────────────────────
// Frosted translucent plastic housing (ABS / polycarbonate blend)
const housingMat = new THREE.MeshPhysicalMaterial({
    color:         0x181b2a,  // dark navy
    roughness:     0.50,
    metalness:     0.00,
    transmission:  0.22,      // partial light transmission (Beer-Lambert)
    thickness:     0.009,     // slab thickness in metres
    ior:           1.49,      // ABS plastic
    transparent:   true,
    side:          THREE.DoubleSide,
});

// Glossy side button
const buttonMat = new THREE.MeshPhysicalMaterial({
    color:     0x23263a,
    roughness: 0.18,
    metalness: 0.04,
});

// LED die — emissive colour updated dynamically by the JS bridge
const ledColorVec = new THREE.Color(ledR, ledG, ledB);
const ledMat = new THREE.MeshStandardMaterial({
    color:             ledColorVec.clone(),
    emissive:          ledColorVec.clone(),
    emissiveIntensity: ledActive ? LED_EMISSIVE_INTENSITY : 0,
    roughness:         0.10,
    metalness:         0.00,
    toneMapped:        false,   // keep emissive in HDR for bloom
});

// LED diffuser cap — frosted micro-lens over the die
const ledCapMat = new THREE.MeshPhysicalMaterial({
    color:        0xffffff,
    roughness:    0.60,
    transmission: 0.80,
    thickness:    0.001,
    ior:          1.50,
    transparent:  true,
    opacity:      0.88,
    toneMapped:   false,
});

// PCB — matte green FR4 substrate, faint metallic sheen for copper pads
const pcbMat = new THREE.MeshStandardMaterial({
    color:     0x1b3a1e,
    roughness: 0.88,
    metalness: 0.08,
});

// Metal contacts / spring clips / screws (stainless / brass)
const metalMat = new THREE.MeshStandardMaterial({
    color:     0xb8a870,  // warm brass; change to 0xb0b8c0 for stainless
    roughness: 0.22,
    metalness: 0.92,
});

// Rubber — gaskets, grip inserts, o-rings
const rubberMat = new THREE.MeshStandardMaterial({
    color:     0x101010,
    roughness: 0.96,
    metalness: 0.00,
});

// ─────────────────────────────────────────────────────────────
// Material assignment rules
//
// HOW TO USE
// ──────────
// 1. Set DEBUG_NAMES = true (below), load the page, and check
//    the browser / Logcat / Xcode console for a line like:
//      [FobViewer] meshes in GLB: "Housing Top", "Housing Bottom", "LED", ...
//
//    Alternatively open your .glb in https://gltf.report — the scene tree
//    shows every node name exactly as Three.js will see it.
//
// 2. Fill in MATERIAL_RULES below. Each entry is:
//      { match: string | RegExp, mat: <one of the materials above> }
//    `match` is tested against child.name (case-insensitive substring or regex).
//    Rules are checked top-to-bottom; the FIRST match wins.
//    The last catch-all rule assigns housingMat to everything unmatched.
//
// 3. Re-export from Onshape whenever you rename parts so the names stay in sync.
// ─────────────────────────────────────────────────────────────
const DEBUG_NAMES = true;   // ← set false before shipping

const MATERIAL_RULES = [
    // ── Exact / specific names first ────────────────────────
    // Fill these in once you know your Onshape part names.
    // Example:  { match: 'Housing Top',  mat: housingMat },
    //           { match: 'Housing Bottom', mat: housingMat },
    //           { match: 'Button',       mat: buttonMat  },
    //           { match: 'LED',          mat: ledMat     },
    //           { match: 'Lens',         mat: ledCapMat  },
    //           { match: 'PCB',          mat: pcbMat     },
    //           { match: 'Battery Clip', mat: metalMat   },

    // ── Fallback keyword patterns ────────────────────────────
    { match: /led|rgb|emitter|die/i,              mat: ledMat     },
    { match: /diffuser|lens|cap|dome/i,           mat: ledCapMat  },
    { match: /button|btn|trigger|key/i,           mat: buttonMat  },
    { match: /pcb|board|substrate|fr4/i,          mat: pcbMat     },
    { match: /clip|spring|pin|contact|metal|brass|steel|screw|nut/i, mat: metalMat },
    { match: /rubber|gasket|seal|grip|o.?ring/i,  mat: rubberMat  },

    // ── Catch-all (must be last) ─────────────────────────────
    { match: /.*/, mat: housingMat },
];

// ─────────────────────────────────────────────────────────────
// Placeholder geometry — Uguisu fob body
//
// Replace this section with the GLTFLoader block below once
// uguisu_placeholder.glb (or the final model) loads correctly.
// The GLTFLoader already attempts to load the real model and
// removes these meshes on success.
// ─────────────────────────────────────────────────────────────
const FOB_W = 0.056, FOB_H = 0.029, FOB_D = 0.009;

// Main body — slightly rounded BoxGeometry used as stand-in for the Uguisu housing
const bodyGeo  = new THREE.BoxGeometry(FOB_W, FOB_H, FOB_D, 2, 2, 2);
const bodyMesh = new THREE.Mesh(bodyGeo, housingMat);
scene.add(bodyMesh);

// Side button cap (cylindrical, protruding from top face)
const btnGeo  = new THREE.CylinderGeometry(0.006, 0.0065, 0.003, 32);
const btnMesh = new THREE.Mesh(btnGeo, buttonMat);
btnMesh.rotation.x = Math.PI / 2;
btnMesh.position.set(0, 0, FOB_D / 2 + 0.0014);
scene.add(btnMesh);

// LED die (small sphere, top-right of face)
const ledGeo  = new THREE.SphereGeometry(0.0018, 20, 20);
const ledMesh = new THREE.Mesh(ledGeo, ledMat);
ledMesh.position.set(0.019, 0.009, FOB_D / 2 + 0.0010);
scene.add(ledMesh);

// Frosted diffuser cap over the die
const capGeo  = new THREE.SphereGeometry(0.0026, 20, 20);
const ledCap  = new THREE.Mesh(capGeo, ledCapMat);
ledCap.position.copy(ledMesh.position);
scene.add(ledCap);

// Point light from the LED die — casts coloured light onto surrounding surfaces
const ledPointLight = new THREE.PointLight(
    ledColorVec.clone(),
    ledActive ? LED_POINT_INTENSITY : 0,
    LED_POINT_DISTANCE
);
ledPointLight.position.copy(ledMesh.position);
scene.add(ledPointLight);

const placeholderMeshes = [bodyMesh, btnMesh, ledMesh, ledCap];

// ─────────────────────────────────────────────────────────────
// GLTF model loader
// Attempts to load the real model; silently falls back to the
// placeholder geometry above if the file is absent or malformed.
// ─────────────────────────────────────────────────────────────
const gltfLoader = new GLTFLoader();

gltfLoader.load(
    './uguisu_placeholder.glb',
    (gltf) => {
        // Dismiss the placeholder meshes
        placeholderMeshes.forEach(m => scene.remove(m));

        const model = gltf.scene;

        // Debug: print every mesh name so you can fill in MATERIAL_RULES above.
        if (DEBUG_NAMES) {
            const names = [];
            model.traverse(c => { if (c.isMesh) names.push(`"${c.name}"`); });
            console.log('[FobViewer] meshes in GLB:', names.join(', '));
        }

        // Assign materials using MATERIAL_RULES (defined above).
        model.traverse((child) => {
            if (!child.isMesh) return;
            const rule = MATERIAL_RULES.find(r =>
                r.match instanceof RegExp
                    ? r.match.test(child.name)
                    : child.name.toLowerCase().includes(r.match.toLowerCase())
            );
            if (rule) child.material = rule.mat;
        });

        // Normalise scale so the longest axis ≈ FOB_W
        const box    = new THREE.Box3().setFromObject(model);
        const size   = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale  = FOB_W / maxDim;
        model.scale.setScalar(scale);

        // Centre at origin
        const centre = box.getCenter(new THREE.Vector3()).multiplyScalar(scale);
        model.position.sub(centre);

        scene.add(model);
    },
    undefined,
    (err) => {
        // Placeholder geometry already in scene — nothing to do.
        console.warn('[FobViewer] GLB load skipped, using placeholder geometry:', err?.message ?? err);
    }
);

// ─────────────────────────────────────────────────────────────
// OrbitControls
// ─────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping   = true;
controls.dampingFactor   = 0.055;
controls.enableZoom      = false;  // zoom locked — this is an embedded widget
controls.enablePan       = false;
controls.autoRotate      = true;
controls.autoRotateSpeed = 0.9;
controls.minPolarAngle   = Math.PI * 0.20;
controls.maxPolarAngle   = Math.PI * 0.80;

// ─────────────────────────────────────────────────────────────
// Post-processing — selective bloom
//
// Strategy: threshold-based bloom (no full-scene MRT needed).
// The LED die has emissiveIntensity 6.0 → linear pixel value >> 1.
// Regular scene surfaces (lit to ~0–1) stay below the threshold.
// Bloom threshold 0.85 in linear HDR space catches only the LED glow.
//
//   bloom(input, strength, radius, threshold)
//     strength  1.3 — moderate halo brightness
//     radius    0.75 — spread of the bloom kernel
//     threshold 0.85 — luminance floor (linear, pre-tonemapping)
// ─────────────────────────────────────────────────────────────
const postProcessing   = new THREE.PostProcessing(renderer);
const scenePass        = pass(scene, camera);
const scenePassColor   = scenePass.getTextureNode('output');
const bloomPass        = bloom(scenePassColor, 1.3, 0.75, 0.85);

// bloom() returns the composited output (base scene + bloom overlay)
postProcessing.outputNode = bloomPass;

// ─────────────────────────────────────────────────────────────
// Resize
// ─────────────────────────────────────────────────────────────
function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', onResize);

// ─────────────────────────────────────────────────────────────
// Render loop
// ─────────────────────────────────────────────────────────────
renderer.setAnimationLoop(() => {
    controls.update();
    postProcessing.render();
});

// ─────────────────────────────────────────────────────────────
// Native JS bridge
// ─────────────────────────────────────────────────────────────

/**
 * Primary bridge entry-point called from native via:
 *   Android:  webView.evaluateJavascript("window.setLedState(r,g,b,active)", null)
 *   iOS:      webView.evaluateJavaScript("window.setLedState(r,g,b,active)")
 *
 * @param {number} r   0–255
 * @param {number} g   0–255
 * @param {number} b   0–255
 * @param {boolean} active  true = LED lit, false = off
 */
window.setLedState = function(r, g, b, active) {
    ledR = r / 255;
    ledG = g / 255;
    ledB = b / 255;
    ledActive = !!active;

    const col = new THREE.Color(ledR, ledG, ledB);

    ledMat.color.copy(col);
    ledMat.emissive.copy(col);
    ledMat.emissiveIntensity = ledActive ? LED_EMISSIVE_INTENSITY : 0;
    ledMat.needsUpdate = true;

    ledCapMat.needsUpdate = true;   // transmission material reacts to emissive neighbour

    ledPointLight.color.copy(col);
    ledPointLight.intensity = ledActive ? LED_POINT_INTENSITY : 0;
};

/**
 * Pause / resume the idle auto-rotation.
 * @param {boolean} enabled
 */
window.setAutoRotate = function(enabled) {
    controls.autoRotate = !!enabled;
};

// postMessage fallback (useful for debugging in a browser devtools)
window.addEventListener('message', (event) => {
    try {
        const msg = JSON.parse(event.data);
        if (msg.type === 'setLed') {
            window.setLedState(
                msg.r   ?? 0,
                msg.g   ?? 255,
                msg.b   ?? 70,
                msg.active ?? true
            );
        } else if (msg.type === 'setAutoRotate') {
            window.setAutoRotate(msg.enabled ?? true);
        }
    } catch (_) { /* ignore non-JSON messages */ }
});

</script>
</body>
</html>
